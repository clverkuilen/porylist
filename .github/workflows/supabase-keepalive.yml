name: Supabase keep-alive

on:
  schedule:
    # Runs every 5 days at 09:00 UTC — well within Supabase's 7-day inactivity window
    - cron: "0 9 */5 * *"
  workflow_dispatch: # allow manual runs from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ping Supabase database
        run: |
          npm install --no-save @supabase/supabase-js@latest 2>/dev/null
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const supabase = createClient(
            'https://gkwaaznwbwuidfpczyel.supabase.co',
            'sb_publishable_-xAWajsU4z8xx3xqHXa87g_YaC9_rLo'
          );
          supabase
            .from('caught_pokemon')
            .select('id', { count: 'exact', head: true })
            .then(({ error }) => {
              if (error) {
                // RLS / empty-table errors still mean the DB was queried — that's all we need
                console.log('DB reached, response:', error.message);
              } else {
                console.log('Ping successful');
              }
            })
            .catch(e => { console.error(e); process.exit(1); });
          "
