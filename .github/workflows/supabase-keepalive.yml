name: Supabase keep-alive

on:
  schedule:
    # Runs every 5 days at 09:00 UTC — well within Supabase's 7-day inactivity window
    - cron: "0 9 */5 * *"
  workflow_dispatch: # allow manual runs from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gkwaaznwbwuidfpczyel.supabase.co/rest/v1/" \
            -H "apikey: sb_publishable_-xAWajsU4z8xx3xqHXa87g_YaC9_rLo" \
            -H "Authorization: Bearer sb_publishable_-xAWajsU4z8xx3xqHXa87g_YaC9_rLo")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Unexpected status code $STATUS"
            exit 1
          fi
